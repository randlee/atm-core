[atm]
default_team = "atm-dev"
identity = "team-lead"

[[atm.post_send_hooks]]
recipient = "arch-ctm"
command = ["scripts/atm-nudge.sh", "arch-ctm"]

[plugins.atm-agent-mcp]
codex_bin = "codex"
identity = "arch-ctm"
sandbox = "workspace-write"
approval_policy = "on-failure"

# ── rmux: tmux session launcher ──────────────────────────────────────
[rmux]
session = "atm-dev"

[[rmux.windows]]
name = "agents"
layout = "even-horizontal"

[[rmux.windows.panes]]
name = "team-lead"
model = "sonnet"
color = "blue"
env = { ATM_IDENTITY = "team-lead", ATM_TEAM = "atm-dev", CLAUDE_CODE_TASK_LIST_ID = "atm-dev" }

[[rmux.windows.panes]]
name = "arch-ctm"
command = "codex -c features.codex_hooks=true --yolo"
env = { ATM_IDENTITY = "arch-ctm", ATM_TEAM = "atm-dev", CLAUDE_CODE_TASK_LIST_ID = "atm-dev" }

[[rmux.windows.panes]]
name = "quality-mgr"
model = "sonnet"
color = "blue"
env = { ATM_IDENTITY = "quality-mgr", ATM_TEAM = "atm-dev", CLAUDE_CODE_TASK_LIST_ID = "atm-dev" }

[[rmux.windows]]
name = "monitoring"
layout = "even-vertical"

[[rmux.windows.panes]]
name = "logs"
command = "tail -f /tmp/atm.log"

[[rmux.windows.panes]]
name = "atm-monitor"
model = "haiku"
agent = "atm-monitor"

[[rmux.windows.panes]]
name = "arch-ctask"
command = "codex -c features.codex_hooks=true --yolo"
env = { ATM_IDENTITY = "arch-ctask", ATM_TEAM = "atm-dev", CLAUDE_CODE_TASK_LIST_ID = "atm-dev" }

[[rmux.windows.panes]]
name = "atm-term"

